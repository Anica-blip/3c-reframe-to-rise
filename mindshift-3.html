<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3C MindShift Kit - Reframe To Rise</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0714; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Open Sans', sans-serif; }

        #bgImg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain; object-position: center; z-index: 0;
        }

        #overlayWrap { position: fixed; z-index: 10; }

        /* ── Emotion Buttons ──
           Chef: adjust these % values to sit over each label button in the image.
           All % are relative to the rendered image area — works the same on mobile & desktop.
        */
        .emotion-btn {
            position: absolute;
            cursor: pointer;
            background: transparent;
            border-radius: 14px;
            transition: background 0.2s ease;
        }
        .emotion-btn:hover  { background: rgba(255, 220, 180, 0.12); }
        .emotion-btn:active { background: rgba(255, 220, 180, 0.28); }

        /* Row 1 */
        #btn-anxious      { top: 22.2%; left: 34.5%; width: 12%; height: 9%; }
        #btn-frustrated   { top: 22.2%; right: 32.5%; width: 12%; height: 9%; }

        /* Row 2 */
        #btn-unworthy     { top: 34.3%; left: 34.5%; width: 12%; height: 9%; }
        #btn-ashamed      { top: 34.3%; right: 32.5%; width: 12%; height: 9%; }

        /* Row 3 */
        #btn-overwhelmed  { top: 46.4%; left: 34.5%; width: 12%; height: 9%; }
        #btn-embarrassed  { top: 46.4%; right: 32.5%; width: 12%; height: 9%; }

        /* Row 4 */
        #btn-heartbroken  { top: 58.7%; left: 34.5%; width: 12%; height: 9%; }
        #btn-numb         { top: 58.7%; right: 32.5%; width: 12%; height: 9%; }

        /* Row 5 */
        #btn-guilty       { top: 70.9%; left: 34.5%; width: 12%; height: 9%; }
        #btn-lonely       { top: 70.9%; right: 32.5%; width: 12%; height: 9%; }

        /* Next arrow */
        #next-btn {
            position: absolute;
            bottom: 7%; left: 52.3%;
            transform: translateX(-50%);
            width: 12%; height: 6%;
            cursor: pointer;
            background: transparent;
            border-radius: 8px;
        }

        /* ══════════════════════════════════
           CARD POPUP
        ══════════════════════════════════ */
        .popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 7, 20, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .popup-overlay.active { display: flex; }

        /* 3D scene */
        .card-scene {
            perspective: 1200px;
            width: min(340px, 92vw);
            /* height is auto — card grows with content, no fixed height */
        }

        .card-inner {
            position: relative;
            width: 100%;
            transform-style: preserve-3d;
            transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-inner.flipped .card-front-face { visibility: hidden; }

        /* Shared face */
        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            visibility: visible;
            border-radius: 22px;
            padding: 26px 22px 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 88vh;
            overflow-y: auto;
            /* Glass grey glassmorphism */
            background: rgba(60, 60, 70, 0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(200, 155, 100, 0.28);
            box-shadow: 0 12px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        /* Back face sits on top of front — both must be present in DOM */
        .card-back-face {
            position: absolute;
            top: 0; left: 0; right: 0;
            transform: rotateY(180deg);
        }

        .card-day-label {
            font-size: 11px; font-weight: 600;
            letter-spacing: 1.8px; text-transform: uppercase;
            color: rgba(200, 155, 100, 0.85);
        }
        .card-title {
            font-size: 20px; font-weight: 700;
            color: #61d8e6; line-height: 1.15;
        }
        .card-divider {
            height: 1px;
            background: rgba(200, 155, 100, 0.22);
            border: none; flex-shrink: 0;
        }
        .card-quote {
            font-size: 14px; font-style: italic;
            color: rgba(255,255,255,0.95); line-height: 1.65;
            border-left: 3px solid rgba(200,155,100,0.65);
            padding-left: 13px;
        }
        .card-reflection {
            font-size: 13px;
            color: rgba(255,255,255,0.75); line-height: 1.75;
        }
        .unlock-timer {
            display: flex; align-items: center; gap: 8px;
            font-size: 11.5px; color: rgba(200,155,100,0.7);
            flex-shrink: 0;
        }
        .unlock-dot {
            width: 6px; height: 6px; flex-shrink: 0;
            border-radius: 50%; background: rgba(200,155,100,0.6);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.3; } 50% { opacity: 1; }
        }

        /* Back sections */
        .back-section { display: flex; flex-direction: column; gap: 4px; }
        .back-label {
            font-size: 10px; font-weight: 700;
            letter-spacing: 1.4px; text-transform: uppercase;
            color: #61d8e6;
        }
        .back-text {
            font-size: 13px; color: rgba(255,255,255,0.82);
            line-height: 1.65; padding: 9px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border: 1px solid rgba(200,155,100,0.15);
        }

        /* Loading */
        .card-loading {
            padding: 32px 0; text-align: center;
            font-size: 14px; color: rgba(255,255,255,0.45);
        }

        /* Buttons */
        .card-actions { display: flex; flex-direction: column; gap: 9px; flex-shrink: 0; }

        .btn-deeper {
            padding: 13px; border-radius: 14px;
            border: 1px solid rgba(200,155,100,0.35);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.94);
            font-family: 'Open Sans', sans-serif;
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease;
        }
        .btn-deeper:hover { background: rgba(255,255,255,0.15); border-color: rgba(200,155,100,0.55); }

        .btn-return {
            padding: 11px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.14);
            background: transparent;
            color: rgba(255,255,255,0.55);
            font-family: 'Open Sans', sans-serif;
            font-size: 13px; cursor: pointer;
            transition: all 0.25s ease;
        }
        .btn-return:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }

        /* Scrollbar styling inside card */
        .card-face::-webkit-scrollbar { width: 4px; }
        .card-face::-webkit-scrollbar-track { background: transparent; }
        .card-face::-webkit-scrollbar-thumb { background: rgba(200,155,100,0.3); border-radius: 4px; }
    </style>
</head>
<body>

    <img id="bgImg" src="assets/4.png" alt="">

    <div id="overlayWrap">
        <div class="emotion-btn" id="btn-anxious"     onclick="openCard('anxious')"></div>
        <div class="emotion-btn" id="btn-frustrated"  onclick="openCard('frustrated')"></div>
        <div class="emotion-btn" id="btn-unworthy"    onclick="openCard('unworthy')"></div>
        <div class="emotion-btn" id="btn-ashamed"     onclick="openCard('ashamed')"></div>
        <div class="emotion-btn" id="btn-overwhelmed" onclick="openCard('overwhelmed')"></div>
        <div class="emotion-btn" id="btn-embarrassed" onclick="openCard('embarrassed')"></div>
        <div class="emotion-btn" id="btn-heartbroken" onclick="openCard('heartbroken')"></div>
        <div class="emotion-btn" id="btn-numb"        onclick="openCard('numb')"></div>
        <div class="emotion-btn" id="btn-guilty"      onclick="openCard('guilty')"></div>
        <div class="emotion-btn" id="btn-lonely"      onclick="openCard('lonely')"></div>
        <div id="next-btn" onclick="window.location.href='meditation.html'"></div>
    </div>

    <!-- Card Popup — outside overlayWrap so it covers full screen -->
    <div class="popup-overlay" id="cardPopup">
        <div class="card-scene">
            <div class="card-inner" id="cardInner">

                <!-- FRONT -->
                <div class="card-face card-front-face" id="cardFront">
                    <div class="card-day-label" id="frontDayLabel">Day 1 of 7</div>
                    <div class="card-title"     id="frontTitle">—</div>
                    <hr class="card-divider">
                    <div class="card-loading"   id="frontLoading">Loading your card...</div>
                    <blockquote class="card-quote"      id="frontQuote"      style="display:none;"></blockquote>
                    <p          class="card-reflection" id="frontReflection" style="display:none;"></p>
                    <div class="unlock-timer" id="unlockTimer" style="display:none;">
                        <span class="unlock-dot"></span>
                        <span id="unlockTimerText">Next card available in 24 hours</span>
                    </div>
                    <div class="card-actions" id="frontActions" style="display:none;">
                        <button class="btn-deeper" onclick="flipCard()">Go Deeper ↓</button>
                        <button class="btn-return" onclick="closeCard()">Return</button>
                    </div>
                </div>

                <!-- BACK -->
                <div class="card-face card-back-face" id="cardBack">
                    <div class="card-day-label" id="backDayLabel">Day 1 of 7 · Go Deeper</div>
                    <div class="card-title"     id="backTitle">—</div>
                    <hr class="card-divider">
                    <div class="back-section">
                        <div class="back-label">Mantra</div>
                        <div class="back-text" id="backMantra"></div>
                    </div>
                    <div class="back-section">
                        <div class="back-label">Reframe</div>
                        <div class="back-text" id="backReframe"></div>
                    </div>
                    <div class="back-section">
                        <div class="back-label">Action</div>
                        <div class="back-text" id="backAction"></div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-return" onclick="closeCard()">Return</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ── Image-aware overlay positioning ──
        function fitOverlays() {
            var img = document.getElementById('bgImg');
            if (!img.naturalWidth) return;
            var vw = window.innerWidth, vh = window.innerHeight;
            var ir = img.naturalWidth / img.naturalHeight;
            var vr = vw / vh;
            var w, h, x, y;
            if (vr > ir) { h = vh; w = h * ir; x = (vw - w) / 2; y = 0; }
            else         { w = vw; h = w / ir; x = 0; y = (vh - h) / 2; }
            var wrap = document.getElementById('overlayWrap');
            wrap.style.left = x + 'px'; wrap.style.top = y + 'px';
            wrap.style.width = w + 'px'; wrap.style.height = h + 'px';
        }
        var bgImg = document.getElementById('bgImg');
        bgImg.onload = fitOverlays;
        if (bgImg.complete && bgImg.naturalWidth) fitOverlays();
        window.addEventListener('resize', fitOverlays);

        // ── Cards data ──
        var cardsData = null;

        var emotionLabels = {
            anxious:'Anxious', frustrated:'Frustrated', unworthy:'Unworthy',
            ashamed:'Ashamed', overwhelmed:'Overwhelmed', embarrassed:'Embarrassed',
            heartbroken:'Heartbroken', numb:'Numb', guilty:'Guilty', lonely:'Lonely'
        };

        // Try assets/cards.json first, fall back to root cards.json
        async function loadCards() {
            if (cardsData) return cardsData;
            var paths = ['assets/cards.json', 'cards.json'];
            for (var i = 0; i < paths.length; i++) {
                try {
                    var res = await fetch(paths[i]);
                    if (res.ok) { cardsData = await res.json(); return cardsData; }
                } catch(e) { /* try next */ }
            }
            return null;
        }

        // Day unlock via localStorage — first touch = Day 1, +1 per 24hrs, max 7
        function getDayNumber(emotion) {
            var key = 'rtc_start_' + emotion;
            var now = Date.now();
            var stored = localStorage.getItem(key);
            if (!stored) { localStorage.setItem(key, now.toString()); return 1; }
            var days = Math.floor((now - parseInt(stored, 10)) / 86400000);
            return Math.min(days + 1, 7);
        }

        async function openCard(emotion) {
            var label = emotionLabels[emotion];
            var day   = getDayNumber(emotion);

            // Reset flip
            document.getElementById('cardInner').classList.remove('flipped');

            // Set labels
            document.getElementById('frontDayLabel').textContent = 'Day ' + day + ' of 7';
            document.getElementById('frontTitle').textContent    = label;
            document.getElementById('backDayLabel').textContent  = 'Day ' + day + ' of 7 · Go Deeper';
            document.getElementById('backTitle').textContent     = label;

            // Reset front visibility
            document.getElementById('frontLoading').style.display    = 'block';
            document.getElementById('frontLoading').textContent      = 'Loading your card...';
            document.getElementById('frontQuote').style.display      = 'none';
            document.getElementById('frontReflection').style.display = 'none';
            document.getElementById('frontActions').style.display    = 'none';
            document.getElementById('unlockTimer').style.display     = 'none';

            document.getElementById('cardPopup').classList.add('active');

            var data = await loadCards();
            if (!data) {
                document.getElementById('frontLoading').textContent = 'Could not load card. Please check cards.json is in the assets/ folder.';
                return;
            }

            var days = data[emotion];
            if (!days || !days[day - 1]) {
                document.getElementById('frontLoading').textContent = 'Card content for this day is coming soon.';
                return;
            }

            var card = days[day - 1];

            document.getElementById('frontQuote').textContent      = '\u201C' + card.front.quote + '\u201D';
            document.getElementById('frontReflection').textContent = card.front.reflection;
            document.getElementById('backMantra').textContent      = card.back.mantra;
            document.getElementById('backReframe').textContent     = card.back.reframe;
            document.getElementById('backAction').textContent      = card.back.action;

            document.getElementById('frontLoading').style.display    = 'none';
            document.getElementById('frontQuote').style.display      = 'block';
            document.getElementById('frontReflection').style.display = 'block';
            document.getElementById('frontActions').style.display    = 'flex';

            if (day < 7) {
                document.getElementById('unlockTimerText').textContent = 'Next card available in 24 hours';
                document.getElementById('unlockTimer').style.display = 'flex';
            }
        }

        function flipCard()  { document.getElementById('cardInner').classList.add('flipped'); }
        function closeCard() {
            document.getElementById('cardPopup').classList.remove('active');
            document.getElementById('cardInner').classList.remove('flipped');
        }

        // Tap outside card to close
        document.getElementById('cardPopup').addEventListener('click', function(e) {
            if (e.target === this) closeCard();
        });

        // Preload on page ready
        window.addEventListener('load', loadCards);
    </script>
</body>
</html>
