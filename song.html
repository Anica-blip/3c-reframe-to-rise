<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song - Return to Center</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/6.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0a0714;
        }

        .clickable-area {
            position: fixed;
            cursor: pointer;
            background: transparent;
            border: none;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .clickable-area:hover {
            background: rgba(97, 216, 230, 0.1);
        }

        .clickable-area:active {
            background: rgba(97, 216, 230, 0.2);
        }

        #play-btn {
            bottom: 20%;
            left: 49%;
            transform: translateX(-50%);
            width: 121px;
            height: 123.5px;
            -webkit-tap-highlight-color: rgba(97, 216, 230, 0.3);
        }

        #next-btn {
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 40px;
            -webkit-tap-highlight-color: rgba(97, 216, 230, 0.3);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            #play-btn {
                width: 150px;
                height: 150px;
            }

            #next-btn {
                width: 120px;
                height: 60px;
                bottom: 4%;
            }
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="background-container"></div>

    <audio id="song-audio">
        <source src="assets/3C Meditation Song - Return to Center.mp3" type="audio/mpeg">
    </audio>

    <div class="clickable-area" id="play-btn" onclick="document.getElementById('song-audio').play()"></div>
    <!-- Fixed: was going to home.html, now correctly continues cycle to thankyou -->
    <div class="clickable-area" id="next-btn" onclick="window.location.href='thankyou.html'"></div>

    <script>
        window.addEventListener('beforeunload', () => {
            document.getElementById('song-audio').pause();
        });
    </script>
</body>
</html>
