<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song - Return to Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Reframe to Rise - background/6.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #2d1b4e;
        }

        .clickable-area {
            position: fixed;
            cursor: pointer;
            background: transparent;
            border: none;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .clickable-area:hover {
            background: rgba(97, 216, 230, 0.1);
        }

        .clickable-area:active {
            background: rgba(97, 216, 230, 0.2);
        }

        /* Play button - positioned over circular play button image near bottom */
        #play-btn {
            bottom: 29%;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 180px;
        }

        /* Home button - positioned over arrow button at bottom */
        #home-btn {
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 60px;
        }

        /* Hidden audio element */
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="background-container"></div>
    
    <!-- Hidden audio element -->
    <audio id="song-audio">
        <source src="Reframe to Rise - background/3C Meditation Song - Return to Center.mp3" type="audio/mpeg">
    </audio>
    
    <!-- Invisible clickable area over circular play button image -->
    <div class="clickable-area" id="play-btn" onclick="document.getElementById('song-audio').play()"></div>
    
    <!-- Invisible clickable area over arrow button at bottom -->
    <div class="clickable-area" id="home-btn" onclick="window.location.href='home.html'"></div>

    <script>
        // Optional: Auto-pause when leaving page
        window.addEventListener('beforeunload', () => {
            document.getElementById('song-audio').pause();
        });
    </script>
</body>
</html>
