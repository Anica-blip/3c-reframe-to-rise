<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song - Return to Center</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0714; overflow: hidden; width: 100vw; height: 100vh; }

        #bgImg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain; object-position: center; z-index: 0;
        }

        #overlayWrap { position: fixed; z-index: 10; }

        .clickable-area {
            position: absolute;
            cursor: pointer;
            background: transparent;
            transition: background 0.2s ease;
        }
        .clickable-area:hover  { background: rgba(97, 216, 230, 0.12); }
        .clickable-area:active { background: rgba(97, 216, 230, 0.25); }

        /* Play button — circular, over the artist/play element in image */
        #play-btn {
            bottom: 20%; left: 49%;
            transform: translateX(-50%);
            width: 20%; height: 18%;
            border-radius: 50%;
        }

        /* Next arrow */
        #next-btn {
            bottom: 6%; left: 50%;
            transform: translateX(-50%);
            width: 22%; height: 6%;
            border-radius: 8px;
        }

        audio { display: none; }
    </style>
</head>
<body>
    <img id="bgImg" src="assets/6.png" alt="">

    <div id="overlayWrap">
        <div class="clickable-area" id="play-btn" onclick="playAudio()"></div>
        <div class="clickable-area" id="next-btn" onclick="window.location.href='thankyou.html'"></div>
    </div>

    <audio id="song-audio">
        <source src="assets/3C Meditation Song - Return to Center.mp3" type="audio/mpeg">
    </audio>

    <script>
        function fitOverlays() {
            var img = document.getElementById('bgImg');
            if (!img.naturalWidth) return;
            var vw = window.innerWidth, vh = window.innerHeight;
            var ir = img.naturalWidth / img.naturalHeight;
            var vr = vw / vh;
            var w, h, x, y;
            if (vr > ir) { h = vh; w = h * ir; x = (vw - w) / 2; y = 0; }
            else         { w = vw; h = w / ir; x = 0; y = (vh - h) / 2; }
            var wrap = document.getElementById('overlayWrap');
            wrap.style.left = x + 'px'; wrap.style.top = y + 'px';
            wrap.style.width = w + 'px'; wrap.style.height = h + 'px';
        }
        var img = document.getElementById('bgImg');
        img.onload = fitOverlays;
        if (img.complete && img.naturalWidth) fitOverlays();
        window.addEventListener('resize', fitOverlays);

        function playAudio() {
            var audio = document.getElementById('song-audio');
            if (audio.paused) { audio.play(); } else { audio.pause(); }
        }

        window.addEventListener('beforeunload', function() {
            document.getElementById('song-audio').pause();
        });
    </script>
</body>
</html>
