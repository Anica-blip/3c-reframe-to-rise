<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reframe to Rise - Virtual Experience</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Reframe To Rise - background/1.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0a0714;
        }

        /* Invisible clickable areas positioned over image buttons at bottom center */
        .section-overlay {
            position: absolute;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
        }

        /* Optional: subtle highlight on hover */
        .section-overlay:hover {
            background: rgba(97, 216, 230, 0.1);
        }

        .section-overlay:active {
            background: rgba(97, 216, 230, 0.2);
        }

        /* Positioning for 3 image containers inside the window frames */
        /* These are positioned over the actual images shown in the windows, not the window frames */
        
        /* Section 1: 3C Mindshift (left image container) */
        #section-mindshift {
            top: 32%;
            left: 25%;
            width: 14%;
            height: 18%;
        }

        /* Section 2: Meditation (center image container) */
        #section-meditation {
            top: 32%;
            left: 43.5%;
            width: 14%;
            height: 18%;
        }

        /* Section 3: Song (right image container) */
        #section-song {
            top: 32%;
            right: 24%;
            width: 14%;
            height: 18%;
        }

        /* Pulse animation for visual feedback */
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .section-overlay.pulse {
            animation: pulse 2s infinite;
        }

        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Background Image -->
    <div class="background-container"></div>

    <!-- Clickable Section Overlays -->
    <div id="section-mindshift" class="section-overlay" onclick="navigateTo('mindshift-1.html')"></div>
    <div id="section-meditation" class="section-overlay" onclick="navigateTo('meditation.html')"></div>
    <div id="section-song" class="section-overlay" onclick="navigateTo('song.html')"></div>

    <!-- Loading Indicator -->
    <div class="loading" id="loading">Loading...</div>

    <script>
        // Navigation function
        function navigateTo(page) {
            document.getElementById('loading').style.display = 'block';
            setTimeout(() => {
                window.location.href = page;
            }, 300);
        }

        // Add pulse effect on page load
        window.addEventListener('load', () => {
            const sections = document.querySelectorAll('.section-overlay');
            sections.forEach((section, index) => {
                setTimeout(() => {
                    section.classList.add('pulse');
                    setTimeout(() => section.classList.remove('pulse'), 2000);
                }, index * 500);
            });
        });
    </script>
</body>
</html>
