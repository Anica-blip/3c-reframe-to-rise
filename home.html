<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reframe to Rise - Virtual Experience</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/1.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0a0714;
        }

        .section-overlay {
            position: absolute;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
        }

        .section-overlay:hover {
            background: rgba(97, 216, 230, 0.1);
        }

        .section-overlay:active {
            background: rgba(97, 216, 230, 0.2);
        }

        #section-mindshift {
            top: 32%;
            left: 25%;
            width: 14%;
            height: 18%;
        }

        #section-meditation {
            top: 32%;
            left: 43.5%;
            width: 14%;
            height: 18%;
        }

        #section-song {
            top: 32%;
            right: 24%;
            width: 14%;
            height: 18%;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .section-overlay.pulse {
            animation: pulse 2s infinite;
        }


        /* Watermark */
        .watermark {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Open Sans', sans-serif;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.55);
            text-align: center;
            white-space: nowrap;
            z-index: 999;
            pointer-events: none;
            letter-spacing: 0.3px;
        }

        .watermark .heart {
            color: #e05555;
        }

        /* Mobile responsive watermark */
        @media (max-width: 768px) {
            .watermark {
                font-size: 8px;
                bottom: 8px;
                max-width: 90vw;
                white-space: normal;
                line-height: 1.3;
            }
        }
    </style>
</head>
<body>
    <div class="background-container"></div>

    <div id="section-mindshift" class="section-overlay" onclick="navigateTo('mindshift-1.html')"></div>
    <div id="section-meditation" class="section-overlay" onclick="navigateTo('meditation.html')"></div>
    <div id="section-song" class="section-overlay" onclick="navigateTo('song.html')"></div>


    <!-- Watermark -->
    <div class="watermark">
        Designed & built with <span class="heart">❤️</span>  by Claude (Anthropic) × Chef Anica · 3C Thread To Success Cooking Lab 🧪👨‍🍳
    </div>

    <script>
        function navigateTo(page) {
            window.location.href = page;
        }

        window.addEventListener('load', () => {
            const sections = document.querySelectorAll('.section-overlay');
            sections.forEach((section, index) => {
                setTimeout(() => {
                    section.classList.add('pulse');
                    setTimeout(() => section.classList.remove('pulse'), 2000);
                }, index * 500);
            });
        });
    </script>
</body>
</html>
