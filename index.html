<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reframe to Rise - Virtual Experience</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta http-equiv="refresh" content="0; url=home.html">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: #0a0714;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .redirect-message {
            text-align: center;
            padding: 20px;
        }

        .redirect-message h1 {
            font-size: 24px;
            color: #61d8e6;
            margin-bottom: 10px;
        }

        .redirect-message p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }

        .spinner {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(97, 216, 230, 0.2);
            border-top-color: #61d8e6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Fallback redirect in case meta refresh doesn't work
        window.location.replace('home.html');
    </script>
</head>
<body>
    <div class="redirect-message">
        <h1>Reframe to Rise</h1>
        <div class="spinner"></div>
        <p>Redirecting to experience...</p>
    </div>
</body>
</html>
