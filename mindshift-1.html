<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3C Mindshift - Step 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Reframe to Rise - background/2.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0a0714;
        }

        /* Invisible clickable area for next button at bottom center */
        .clickable-area {
            position: fixed;
            cursor: pointer;
            background: transparent;
            border: none;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .clickable-area:hover {
            background: rgba(97, 216, 230, 0.1);
        }

        .clickable-area:active {
            background: rgba(97, 216, 230, 0.2);
        }

        #next-btn {
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 40px;
        }

        /* Audio player (if needed for this page) */
        .audio-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
        }

        audio {
            width: 300px;
            max-width: 90vw;
        }
    </style>
</head>
<body>
    <!-- Background Image -->
    <div class="background-container"></div>

    <!-- Invisible clickable area positioned over image button -->
    <div class="clickable-area" id="next-btn" onclick="window.location.href='mindshift-2.html'"></div>

    <!-- Audio Player (hidden by default, show if needed) -->
    <div class="audio-container">
        <audio controls>
            <source src="Reframe to Rise - background/3C Mindshift Guided Affirmation-Meditation.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
</body>
</html>
